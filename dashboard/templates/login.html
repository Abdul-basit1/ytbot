<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KiddoWorld</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle animated background gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(108, 92, 231, 0.05) 0%, transparent 60%);
            animation: drift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, 3%) rotate(3deg); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #1a1d27;
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(108, 92, 231, 0.06);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 14px;
            color: #6b7280;
            font-weight: 400;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
            color: #f87171;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f1117;
            border: 1px solid #2d3142;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: #4b5563;
        }

        .form-group input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, #6c5ce7, #7c6cf7);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
            opacity: 0.9;
        }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #4b5563;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="icon">&#9654;</div>
                <h1>KiddoWorld</h1>
                <p>YouTube Automation Dashboard</p>
            </div>

            <div class="error-message {{ 'visible' if request.query_params.get('error') == '1' else '' }}">
                Invalid username or password
            </div>

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <p class="footer-text">UpperCut &mdash; Automated Video Pipeline</p>
        </div>
    </div>
</body>
</html>

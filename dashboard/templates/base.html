<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{% block title %}UpperCut{% endblock %} — Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMenu()" id="menu-btn">&#9776;</button>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <h1>UpperCut</h1>
            <span class="tagline">YouTube Automation</span>
        </div>
        <a href="/upload" class="nav-create">+ Upload Video</a>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/upload" class="{% if request.url.path == '/upload' %}active{% endif %}">Upload</a></li>
            <li><a href="/trending" class="{% if request.url.path == '/trending' %}active{% endif %}">Trending</a></li>
            <li><a href="/trending-shorts" class="{% if request.url.path == '/trending-shorts' %}active{% endif %}">Trending Shorts</a></li>
            <li><a href="/drafts" class="{% if request.url.path == '/drafts' %}active{% endif %}">Drafts</a></li>
            <li><a href="/videos" class="{% if request.url.path == '/videos' %}active{% endif %}">Videos</a></li>
            <li><a href="/analytics" class="{% if request.url.path == '/analytics' %}active{% endif %}">Analytics</a></li>
            <li><a href="/gallery" class="{% if request.url.path == '/gallery' %}active{% endif %}">Gallery</a></li>
            <li><a href="/thumbnails" class="{% if request.url.path == '/thumbnails' %}active{% endif %}">Thumbnails</a></li>
            <li><a href="/errors" class="{% if request.url.path == '/errors' %}active{% endif %}">Errors</a></li>
            <li><a href="/logout" class="{% if request.url.path == '/logout' %}active{% endif %}">Logout</a></li>
        </ul>
        {% if channels|length > 1 %}
        <div class="channel-switcher">
            <label>Channel</label>
            <select onchange="window.location.href='{{ request.url.path }}?channel='+this.value">
                {% for ch in channels %}
                <option value="{{ ch.id }}" {% if ch.id == active_channel_id %}selected{% endif %}>{{ ch.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('show');
        var btn = document.getElementById('menu-btn');
        btn.innerHTML = document.getElementById('sidebar').classList.contains('open') ? '&#10005;' : '&#9776;';
    }
    // Close menu when clicking a nav link on mobile
    document.querySelectorAll('.nav-links a, .nav-create').forEach(function(link) {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('show');
                document.getElementById('menu-btn').innerHTML = '&#9776;';
            }
        });
    });
    </script>
</body>
</html>

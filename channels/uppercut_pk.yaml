channel:
  name: "UpperCut"
  active: false
  language: "urdu"
  region: "PK"
  target_audience: "Pakistan and India"
  niche: "general_trending"
  sub_niches:
    - geopolitics
    - cricket
    - bollywood
    - celebrity_biography
    - viral_news
    - sports

content:
  long_form_per_day: 1
  shorts_per_day: 2
  min_duration_mins: 8
  max_duration_mins: 12
  tone: "engaging, emotional, conversational"
  script_styles:
    - news_anchor
    - story_narrative
    - debate


schedule:
  long_form_time: "18:00"
  shorts_times: ["09:00", "14:00", "20:00"]
  timezone: "Asia/Karachi"
  pipeline_interval_hours: 6

seo:
  title_language: "urdu"
  description_mix: "urdu_english"
  default_tags:
    - "#Pakistan"
    - "#India"
    - "#Urdu"
    - "#UrduNews"
    - "#Trending"

alerts:
